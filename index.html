<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d1f14"/>
<title>GreenHouse IQ · Smart Irrigation</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  /* ─── CSS Variables ─────────────────────────────────────── */
  :root {
    --bg:         #080f0a;
    --bg2:        #0d1a0f;
    --bg3:        #122016;
    --panel:      #0f1f12;
    --border:     #1c3322;
    --accent:     #22c55e;
    --accent2:    #16a34a;
    --accent-glow:rgba(34,197,94,0.15);
    --warn:       #f59e0b;
    --danger:     #ef4444;
    --info:       #38bdf8;
    --text:       #e2f0e8;
    --text2:      #7fa88a;
    --text3:      #3d6349;
    --mono:       'Space Mono', monospace;
    --sans:       'Syne', sans-serif;
    --radius:     12px;
    --radius-sm:  8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Noise texture overlay ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .4;
  }

  /* ─── Grid scan line effect ─────────────────────────────── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,80,0.015) 2px,
      rgba(0,255,80,0.015) 4px
    );
    pointer-events: none; z-index: 9998;
  }

  /* ─── Layout ────────────────────────────────────────────── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(8,15,10,0.92);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: .75rem;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .logo h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em; }
  .logo span { font-family: var(--mono); font-size: .7rem; color: var(--text2); }

  .header-right { display: flex; align-items: center; gap: .75rem; }

  #ble-status {
    display: flex; align-items: center; gap: .4rem;
    font-family: var(--mono); font-size: .7rem;
    padding: .35rem .75rem;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--bg2);
    cursor: pointer;
    transition: all .2s;
  }
  #ble-status:hover { border-color: var(--accent); }
  #ble-status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    transition: background .3s;
  }
  #ble-status.connected .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  #ble-status.connecting .dot {
    background: var(--warn);
    animation: blink .6s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--accent); }
    50%       { box-shadow: 0 0 16px var(--accent); }
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }

  main {
    flex: 1;
    padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1.5rem;
    max-width: 1400px; margin: 0 auto; width: 100%;
  }

  /* ─── Summary strip ─────────────────────────────────────── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
  }

  .metric-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    position: relative; overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .metric-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s;
  }
  .metric-card:hover::before { transform: scaleX(1); }

  .metric-label {
    font-family: var(--mono); font-size: .6rem; color: var(--text2);
    text-transform: uppercase; letter-spacing: .1em;
    margin-bottom: .4rem;
  }
  .metric-value {
    font-size: 1.8rem; font-weight: 800; line-height: 1;
    color: var(--text);
    letter-spacing: -.02em;
  }
  .metric-unit { font-size: .85rem; color: var(--text2); margin-left: .2rem; }
  .metric-icon {
    position: absolute; right: 1rem; top: 50%;
    transform: translateY(-50%);
    font-size: 1.8rem; opacity: .1;
  }

  .metric-card.warn  .metric-value { color: var(--warn); }
  .metric-card.danger .metric-value { color: var(--danger); }
  .metric-card.good  .metric-value { color: var(--accent); }

  /* ─── Zones grid ─────────────────────────────────────────── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: .75rem;
  }
  .section-title {
    font-size: .75rem; font-family: var(--mono);
    color: var(--text2); text-transform: uppercase; letter-spacing: .12em;
  }

  .zones-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
  }

  .zone-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .zone-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(34,197,94,.1);
  }
  .zone-card.disabled { opacity: .5; }

  .zone-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .875rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  .zone-title {
    display: flex; align-items: center; gap: .5rem;
    font-weight: 700; font-size: .9rem;
  }
  .zone-badge {
    font-family: var(--mono); font-size: .6rem;
    padding: .15rem .5rem;
    border-radius: 99px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .zone-badge.irrigating {
    background: rgba(34,197,94,.15);
    border-color: var(--accent);
    color: var(--accent);
    animation: blink 1.2s infinite;
  }

  .zone-body { padding: 1rem; display: flex; flex-direction: column; gap: .75rem; }

  /* Moisture bar */
  .moisture-bar-wrap { }
  .moisture-bar-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: .35rem;
  }
  .moisture-label { font-family: var(--mono); font-size: .65rem; color: var(--text2); }
  .moisture-pct   { font-family: var(--mono); font-size: .75rem; font-weight: 700; }

  .bar-track {
    height: 8px; background: var(--bg);
    border-radius: 99px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width .8s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
    background: white; opacity: .4; border-radius: 99px;
    filter: blur(2px);
  }
  .bar-fill.low { background: linear-gradient(90deg, #7c3535, var(--danger)); }
  .bar-fill.high { background: linear-gradient(90deg, #1d4e8a, var(--info)); }

  /* Range markers */
  .bar-markers {
    position: relative; height: 12px; margin-top: 2px;
  }
  .bar-marker {
    position: absolute; transform: translateX(-50%);
    font-size: .5rem; font-family: var(--mono); color: var(--text3);
  }
  .bar-marker.min::before {
    content: '▲'; display: block; text-align: center; color: var(--danger);
  }
  .bar-marker.max::before {
    content: '▲'; display: block; text-align: center; color: var(--info);
  }

  /* Zone controls */
  .zone-controls {
    display: flex; gap: .5rem; align-items: center;
  }

  .btn {
    font-family: var(--mono); font-size: .65rem; font-weight: 700;
    padding: .4rem .75rem;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .btn:active { transform: scale(.96); }

  .btn-primary {
    background: var(--accent); color: #040f06;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #16a34a; }

  .btn-outline {
    background: transparent; color: var(--text2);
    border-color: var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent; color: var(--danger);
    border-color: #7f1d1d;
  }
  .btn-danger:hover { background: rgba(239,68,68,.1); }

  .btn-sm { padding: .3rem .55rem; font-size: .6rem; }

  /* Crop selector */
  .crop-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono); font-size: .65rem;
    padding: .3rem .5rem;
    cursor: pointer;
    outline: none;
    flex: 1;
  }
  .crop-select:focus { border-color: var(--accent); }

  /* Toggle switch */
  .toggle-wrap {
    display: flex; align-items: center; gap: .4rem;
    font-family: var(--mono); font-size: .6rem; color: var(--text2);
  }
  .toggle {
    width: 32px; height: 18px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    position: relative; cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .toggle.on { background: var(--accent2); border-color: var(--accent); }
  .toggle::before {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: var(--text2); border-radius: 50%;
    transition: transform .2s, background .2s;
  }
  .toggle.on::before { transform: translateX(14px); background: white; }

  /* ─── Bottom row: sprinkler + log ───────────────────────── */
  .bottom-row {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 1rem;
  }

  @media (max-width: 700px) {
    .bottom-row { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: .75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    font-family: var(--mono); font-size: .65rem;
    color: var(--text2); text-transform: uppercase; letter-spacing: .1em;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* Sprinkler */
  .sprinkler-body {
    padding: 1.25rem;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }
  .sprinkler-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--bg3);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    transition: all .3s;
    position: relative;
  }
  .sprinkler-icon.active {
    border-color: var(--info);
    box-shadow: 0 0 30px rgba(56,189,248,.2);
    animation: sprinkle 1.5s infinite;
  }
  @keyframes sprinkle {
    0%,100% { box-shadow: 0 0 15px rgba(56,189,248,.2); }
    50%      { box-shadow: 0 0 35px rgba(56,189,248,.4); }
  }
  .sprinkler-status {
    font-family: var(--mono); font-size: .75rem;
    text-align: center;
  }
  .sprinkler-status .state {
    display: block; font-size: 1rem; font-weight: 700; margin-bottom: .2rem;
  }
  .sprinkler-status .sub { color: var(--text2); font-size: .6rem; }

  /* Event log */
  .log-body {
    padding: .75rem 1rem;
    height: 200px; overflow-y: auto;
    display: flex; flex-direction: column; gap: .3rem;
  }
  .log-body::-webkit-scrollbar { width: 4px; }
  .log-body::-webkit-scrollbar-track { background: var(--bg2); }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .log-entry {
    display: flex; gap: .6rem; align-items: flex-start;
    font-family: var(--mono); font-size: .65rem;
    padding: .25rem 0;
    border-bottom: 1px solid rgba(255,255,255,.03);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateX(-8px); } }

  .log-time { color: var(--text3); flex-shrink: 0; }
  .log-msg  { color: var(--text2); }
  .log-msg.ok     { color: var(--accent); }
  .log-msg.warn   { color: var(--warn); }
  .log-msg.danger { color: var(--danger); }
  .log-msg.info   { color: var(--info); }

  /* ─── Offline banner ─────────────────────────────────────── */
  #offline-banner {
    display: none;
    background: rgba(239,68,68,.15);
    border: 1px solid #7f1d1d;
    border-radius: var(--radius-sm);
    padding: .6rem 1rem;
    font-family: var(--mono); font-size: .7rem;
    color: var(--danger);
    text-align: center;
  }
  body.offline #offline-banner { display: block; }

  /* ─── Responsive ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: .75rem 1rem; }
    main   { padding: 1rem; gap: 1rem; }
    .metric-value { font-size: 1.4rem; }
    .bottom-row { grid-template-columns: 1fr; }
  }

  /* ─── Animations for value changes ──────────────────────── */
  .flash {
    animation: flash .4s ease;
  }
  @keyframes flash {
    0% { opacity: 1; }
    30% { opacity: .3; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <div>
        <h1>GreenHouse IQ</h1>
        <span>Smart Irrigation Controller</span>
      </div>
    </div>
    <div class="header-right">
      <div id="ble-status" onclick="handleBLEClick()">
        <div class="dot"></div>
        <span id="ble-label">Connect BLE</span>
      </div>
    </div>
  </header>

  <main>
    <div id="offline-banner">⚠ Device disconnected — showing last known data</div>

    <!-- Summary strip -->
    <div class="summary-strip">
      <div class="metric-card" id="card-temp">
        <div class="metric-label">Air Temp</div>
        <div class="metric-value" id="val-temp">--<span class="metric-unit">°C</span></div>
        <div class="metric-icon">🌡️</div>
      </div>
      <div class="metric-card" id="card-hum">
        <div class="metric-label">Humidity</div>
        <div class="metric-value" id="val-hum">--<span class="metric-unit">%</span></div>
        <div class="metric-icon">💧</div>
      </div>
      <div class="metric-card" id="card-soiltemp">
        <div class="metric-label">Soil Temp</div>
        <div class="metric-value" id="val-soiltemp">--<span class="metric-unit">°C</span></div>
        <div class="metric-icon">🌱</div>
      </div>
      <div class="metric-card" id="card-pump">
        <div class="metric-label">Pump</div>
        <div class="metric-value" id="val-pump">OFF</div>
        <div class="metric-icon">⚙️</div>
      </div>
    </div>

    <!-- Zones -->
    <div>
      <div class="section-header">
        <div class="section-title">// Irrigation Zones</div>
        <button class="btn btn-danger btn-sm" onclick="stopAll()">■ Stop All</button>
      </div>
      <div class="zones-grid" id="zones-grid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Bottom row -->
    <div class="bottom-row">
      <!-- Sprinkler panel -->
      <div class="panel">
        <div class="panel-header">
          <span>// Sprinkler</span>
          <span id="sprinkler-mode">AUTO</span>
        </div>
        <div class="sprinkler-body">
          <div class="sprinkler-icon" id="sprinkler-icon">💦</div>
          <div class="sprinkler-status">
            <span class="state" id="sprinkler-state-text">STANDBY</span>
            <span class="sub">Temperature & humidity control</span>
          </div>
          <div style="display:flex;gap:.5rem;">
            <button class="btn btn-outline btn-sm" onclick="ble.setSprinkler(true)">▶ ON</button>
            <button class="btn btn-danger btn-sm" onclick="ble.setSprinkler(false)">■ OFF</button>
          </div>
        </div>
      </div>

      <!-- Event log -->
      <div class="panel">
        <div class="panel-header">
          <span>// Event Log</span>
          <button class="btn btn-outline btn-sm" onclick="clearLog()">Clear</button>
        </div>
        <div class="log-body" id="event-log">
          <div class="log-entry">
            <span class="log-time">--:--:--</span>
            <span class="log-msg">Waiting for BLE connection...</span>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script type="module">
import { bleManager as ble } from './src/bleManager.js';
import { CROP_PROFILES } from './src/bleConstants.js';

window.ble = ble;

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  sensors: null,
  config: null,
  zones: [
    { cropIndex: 0, enabled: true,  autoMode: true, moisture: 0, irrigating: false, valve: false },
    { cropIndex: 1, enabled: true,  autoMode: true, moisture: 0, irrigating: false, valve: false },
    { cropIndex: 2, enabled: true,  autoMode: true, moisture: 0, irrigating: false, valve: false },
    { cropIndex: 3, enabled: false, autoMode: true, moisture: 0, irrigating: false, valve: false },
  ],
};

// ─── Zone card rendering ───────────────────────────────────────────────────────
function renderZones() {
  const grid = document.getElementById('zones-grid');
  grid.innerHTML = state.zones.map((z, i) => {
    const crop = CROP_PROFILES[z.cropIndex];
    const pct  = z.moisture;
    const low  = pct < crop.moistMin;
    const high = pct > crop.moistMax;
    const fillClass = low ? 'low' : high ? 'high' : '';

    return `
    <div class="zone-card ${z.valve ? 'active' : ''} ${!z.enabled ? 'disabled' : ''}" id="zone-${i}">
      <div class="zone-header">
        <div class="zone-title">
          <span>Zone ${i+1}</span>
          <span class="zone-badge ${z.valve ? 'irrigating' : ''}">
            ${z.valve ? '💧 IRRIGATING' : z.enabled ? '● STANDBY' : '○ OFF'}
          </span>
        </div>
        <div class="toggle-wrap">
          AUTO
          <div class="toggle ${z.autoMode ? 'on' : ''}" onclick="toggleAutoMode(${i})" title="Toggle Auto/Manual"></div>
        </div>
      </div>
      <div class="zone-body">
        <div class="moisture-bar-wrap">
          <div class="moisture-bar-header">
            <span class="moisture-label">Soil Moisture</span>
            <span class="moisture-pct" style="color:${low?'var(--danger)':high?'var(--info)':'var(--accent)'}">${pct}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${fillClass}" style="width:${pct}%"></div>
          </div>
          <div class="bar-markers">
            <div class="bar-marker min" style="left:${crop.moistMin}%">${crop.moistMin}</div>
            <div class="bar-marker max" style="left:${crop.moistMax}%">${crop.moistMax}</div>
          </div>
        </div>

        <div class="zone-controls">
          <select class="crop-select" onchange="changeCrop(${i}, this.value)">
            ${CROP_PROFILES.map((p,ci) => `<option value="${ci}" ${ci===z.cropIndex?'selected':''}>${p.name}</option>`).join('')}
          </select>
          <div class="toggle-wrap">
            EN
            <div class="toggle ${z.enabled ? 'on' : ''}" onclick="toggleEnabled(${i})" title="Enable/Disable zone"></div>
          </div>
        </div>

        <div class="zone-controls">
          <button class="btn btn-primary btn-sm" onclick="irrigateZone(${i})" ${!z.enabled?'disabled':''}>
            💧 Irrigate
          </button>
          <button class="btn btn-danger btn-sm" onclick="stopZone(${i})">
            ■ Stop
          </button>
          <span style="font-family:var(--mono);font-size:.6rem;color:var(--text3);">
            ${crop.name} · ${crop.moistMin}–${crop.moistMax}% · ${crop.tempMin}–${crop.tempMax}°C
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── BLE Events ───────────────────────────────────────────────────────────────
ble.addEventListener('connected', () => {
  setBLEStatus('connected', 'Connected');
  document.body.classList.remove('offline');
  addLog('BLE connected to GreenHouse-ESP32', 'ok');
});

ble.addEventListener('disconnected', () => {
  setBLEStatus('disconnected', 'Disconnected');
  document.body.classList.add('offline');
  addLog('BLE disconnected — reconnecting...', 'warn');
});

ble.addEventListener('reconnected', () => {
  setBLEStatus('connected', 'Reconnected');
  document.body.classList.remove('offline');
  addLog('BLE reconnected', 'ok');
});

ble.addEventListener('sensors', (e) => {
  const d = e.detail;
  state.sensors = d;

  // Update summary strip
  setMetric('val-temp', d.airTemp?.toFixed(1), d.airTemp > 30 ? 'warn' : d.airTemp < 10 ? 'warn' : 'good');
  setMetric('val-hum',  d.humidity?.toFixed(1), d.humidity < 40 ? 'warn' : 'good');
  setMetric('val-soiltemp', d.soilTemp?.toFixed(1), '');
  setMetric('val-pump', d.pump ? 'ON' : 'OFF', d.pump ? 'good' : '');

  // Update zone moisture
  if (d.moisture) {
    d.moisture.forEach((m, i) => { state.zones[i].moisture = m; });
  }
  if (d.valves) {
    d.valves.forEach((v, i) => { state.zones[i].valve = v; });
  }

  // Sprinkler
  updateSprinkler(d.sprinkler);
  renderZones();
});

ble.addEventListener('config', (e) => {
  const d = e.detail;
  if (d.zones) {
    d.zones.forEach((z, i) => {
      state.zones[i].cropIndex = z.cropIdx ?? z.cropIndex ?? state.zones[i].cropIndex;
      state.zones[i].enabled   = z.enabled  ?? state.zones[i].enabled;
      state.zones[i].autoMode  = z.autoMode ?? state.zones[i].autoMode;
    });
    renderZones();
  }
});

ble.addEventListener('notification', (e) => {
  const d = e.detail;
  const msg = {
    irrigation_start: `Zone ${(d.zone??0)+1} irrigation started`,
    irrigation_stop:  `Zone ${(d.zone??0)+1} irrigation stopped`,
    sprinkler:        `Sprinkler ${d.state ? 'activated' : 'deactivated'}`,
    valve:            `Zone ${(d.zone??0)+1} valve ${d.state ? 'opened' : 'closed'}`,
  }[d.event] || d.event;

  addLog(msg, d.event?.includes('start') || d.state ? 'ok' : 'info');
});

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function setMetric(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  const parent = el.closest('.metric-card');
  parent.className = 'metric-card ' + (cls || '');
  const prev = el.textContent.replace(/[^0-9.-]/g,'');
  const next = String(val ?? '--').replace(/[^0-9.-]/g,'');
  if (prev !== next) { el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),400); }
  if (id === 'val-temp') el.innerHTML = `${val}<span class="metric-unit">°C</span>`;
  else if (id === 'val-hum') el.innerHTML = `${val}<span class="metric-unit">%</span>`;
  else if (id === 'val-soiltemp') el.innerHTML = `${val}<span class="metric-unit">°C</span>`;
  else el.textContent = val;
}

function updateSprinkler(active) {
  const icon = document.getElementById('sprinkler-icon');
  const txt  = document.getElementById('sprinkler-state-text');
  if (active) {
    icon.classList.add('active');
    txt.textContent = 'ACTIVE';
    txt.style.color = 'var(--info)';
  } else {
    icon.classList.remove('active');
    txt.textContent = 'STANDBY';
    txt.style.color = '';
  }
}

function addLog(msg, type = '') {
  const log  = document.getElementById('event-log');
  const now  = new Date().toLocaleTimeString('en-GB');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  log.prepend(entry);
  while (log.children.length > 80) log.removeChild(log.lastChild);
}

function setBLEStatus(status, label) {
  const el = document.getElementById('ble-status');
  el.className = status;
  document.getElementById('ble-label').textContent = label;
}

window.clearLog = () => { document.getElementById('event-log').innerHTML = ''; };

// ─── Actions ──────────────────────────────────────────────────────────────────
window.handleBLEClick = async () => {
  if (ble.connected) { await ble.disconnect(); setBLEStatus('', 'Connect BLE'); return; }
  setBLEStatus('connecting', 'Connecting…');
  try {
    await ble.connect();
  } catch (err) {
    setBLEStatus('', 'Connect BLE');
    addLog('BLE error: ' + err.message, 'danger');
  }
};

window.irrigateZone = async (i) => {
  addLog(`Manual irrigate → Zone ${i+1}`, 'info');
  await ble.irrigateZone(i).catch(e => addLog(e.message, 'danger'));
};

window.stopZone = async (i) => {
  addLog(`Stop → Zone ${i+1}`, 'warn');
  await ble.setValve(i, false).catch(e => addLog(e.message, 'danger'));
};

window.stopAll = async () => {
  addLog('Stop ALL commanded', 'warn');
  await ble.stopAll().catch(e => addLog(e.message, 'danger'));
};

window.changeCrop = async (zoneIdx, cropIdx) => {
  state.zones[zoneIdx].cropIndex = parseInt(cropIdx);
  addLog(`Zone ${zoneIdx+1} crop → ${CROP_PROFILES[cropIdx].name}`, 'info');
  renderZones();
  await ble.setZoneCrop(zoneIdx, parseInt(cropIdx), state.zones[zoneIdx].enabled, state.zones[zoneIdx].autoMode)
    .catch(e => addLog(e.message, 'danger'));
};

window.toggleAutoMode = async (i) => {
  state.zones[i].autoMode = !state.zones[i].autoMode;
  addLog(`Zone ${i+1} mode → ${state.zones[i].autoMode ? 'AUTO' : 'MANUAL'}`, 'info');
  renderZones();
  await ble.setZoneCrop(i, state.zones[i].cropIndex, state.zones[i].enabled, state.zones[i].autoMode)
    .catch(e => addLog(e.message, 'danger'));
};

window.toggleEnabled = async (i) => {
  state.zones[i].enabled = !state.zones[i].enabled;
  addLog(`Zone ${i+1} ${state.zones[i].enabled ? 'enabled' : 'disabled'}`, 'info');
  renderZones();
  await ble.setZoneCrop(i, state.zones[i].cropIndex, state.zones[i].enabled, state.zones[i].autoMode)
    .catch(e => addLog(e.message, 'danger'));
};

// ─── PWA offline detection ────────────────────────────────────────────────────
window.addEventListener('offline', () => addLog('Network offline', 'warn'));
window.addEventListener('online',  () => addLog('Network online', 'ok'));

// ─── Init ─────────────────────────────────────────────────────────────────────
renderZones();
addLog('Dashboard ready — click Connect BLE to start', 'info');

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('[SW] Registered'))
    .catch(e => console.warn('[SW] Failed:', e));
}
</script>
</body>
</html>
