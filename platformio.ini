[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
  DHT sensor library @ ^1.4.6
  OneWire @ ^2.3.7
  DallasTemperature @ ^3.9.0
  bblanchon/ArduinoJson @ ^6.21.3
  ESP32 BLE Arduino @ ^2.0.0

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM
